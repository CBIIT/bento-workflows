name: test-build

# use uv for install/build
# test in one job, build in second job
# provide build artifacts, publish via Trusted Publisher protocol
#  in separate job (in the main repo)
# (best practice based on https://github.com/pypa/gh-action-pypi-publish)

on:
  workflow_call:
    inputs:
      workdir:
        required: true
        type: string
      versions:
        required: true
        type: string
      do-build:
        required: false
        type: boolean
      no-test-mdb:
        required: false
        type: boolean
        default: false

    outputs:
      build-artifact-id:
        description: artifact containing dist/* (the build products)
        value: ${{ jobs.build.outputs.artifact-id }}
jobs:
  test:
        # Set up operating system
    runs-on: ubuntu-latest
    permissions:
      packages: read
      contents: read
    defaults:
      run:
        working-directory: ${{ inputs.workdir }}
    strategy:
      matrix:
        python-version: ${{ fromJSON(inputs.versions) }}
        
    # Define job steps
    steps:
      - name: Check-out repository
        uses: actions/checkout@v4

      - name: Install the latest version of uv and set up python
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Create venv and install 
        run: |
          uv venv
          uv pip install -e .[dev]
          
      - name: Authenticate to registry and pull test MDB
        if: ${{ !inputs.no-test-mdb }}
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker pull ghcr.io/cbiit/test-mdb-amd:neo4.4

      - name: Write compose config, start docker
        if: ${{ !inputs.no-test-mdb }}
        run: |
          cat << EOF > compose-mdb.yml
            services:
              test-mdb:
                image: 'ghcr.io/cbiit/test-mdb-amd:neo4.4'
              ports:
                - "7474:7474"
                - "7687:7687"
              healthcheck:
                test:
                  - "CMD"
                  - "wget"
                  - "http://localhost:7474"
                interval: 15s
                timeout: 30s
                retries: 5
          EOF
          docker compose -f compose-mdb.yml  up -d --wait --wait-timeout 180
          export NEO4J_MDB_URI=bolt://localhost:7687 NEO4J_MDB_USER=neo4j1 \
                 NEO4J_MDB_PASS=neo4j
          echo Response: `curl http://localhost:7474`

      - name: run tests (with coverage)
        run: |
          uv run pytest -s -k "cicd or (not local)" --cov=bento_mdf --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          flag-name: unit-tests
          parallel: false
        continue-on-error: true

  build:
    # Only run this job if the "test" job passes
    needs: test
    environment: release
    permissions:
      id-token: write
    outputs:
      artifact-id: ${{ steps.build-artifact-upload.outputs.artifact-id }}
      
    # Run build only when 'do-build' is set
    if: ${{ inputs.do-build }}
        
    # Set up operating system
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.workdir }}
    strategy:
      matrix:
        python-version: ["3.11"]
            
      # Define job steps
    steps:
      - name: Install the latest version of uv and set up python
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Check-out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create venv, install, and build
        run: |
          uv venv
          uv pip install -e .
          uv build

      - name: Upload build artifact (dist/)
        id: build-artifact-upload
        uses: actions/upload-artifact@v4
        with:
          name: test-build-dist
          path: ./dist/
            
